<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#12406f" />
    <meta name="description" content="Alerte Citoyenne Cameroun — plateforme de signalement citoyen" />
    <title>CIVIALERT - Plateforme de signalement citoyenne</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
  </head>
  <body>
    <noscript>Vous devez activer JavaScript pour utiliser cette application.</noscript>
    <div id="root"></div>
    <script>
      if ('fonts' in document) {
        document.fonts.load('24px "Material Symbols Outlined"').then(function () {
          document.documentElement.classList.add('fonts-loaded');
        }).catch(function () {
          document.documentElement.classList.add('fonts-loaded');
        });
        document.fonts.ready.then(function () {
          document.documentElement.classList.add('fonts-loaded');
        });
        setTimeout(function () {
          document.documentElement.classList.add('fonts-loaded');
        }, 1500);
      } else {
        document.documentElement.classList.add('fonts-loaded');
      }

      (function () {
        function protegerIcones() {
          document.querySelectorAll('.material-symbols-outlined').forEach(function (el) {
            el.setAttribute('translate', 'no');
            el.classList.add('notranslate');
          });
        }
        protegerIcones();
        var observer = new MutationObserver(protegerIcones);
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
